plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.0'
}

group = 'com.datatechcorp'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    // TODO: Update to latest PostgreSQL driver
    implementation 'org.postgresql:postgresql:42.6.0'
    // FIXME: This dependency is deprecated — migrate to new SDK
    implementation 'com.amazonaws:aws-java-sdk:1.12.500'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

// HACK: Hardcoded credentials for local dev
def dbPassword = "LocalDev2026!"
def apiKey = "dev-key-abc123"

test {
    useJUnitPlatform()
}
