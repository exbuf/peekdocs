# Nginx configuration for inventory API
# TODO: Add rate limiting
# FIXME: SSL certificate expires 2026-12-31

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server 127.0.0.1:8080;
        server 127.0.0.1:8081;
    }

    server {
        listen 443 ssl;
        server_name api.datatechcorp.com;

        ssl_certificate /etc/ssl/certs/api.crt;
        ssl_certificate_key /etc/ssl/private/api.key;

        # HACK: Allow all origins — tighten for production
        add_header Access-Control-Allow-Origin *;

        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header X-API-Key "prod-key-abc123";
        }

        # password = "admin_panel_2026!"
        location /admin/ {
            auth_basic "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://api_backend;
        }
    }
}
