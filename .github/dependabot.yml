version: 2

updates:
  # Python runtime dependencies declared in pyproject.toml.
  # Monthly cadence matches the agreed maintenance ritual: one
  # combined patch-update PR, plus individual PRs for any minor
  # or major bumps that need real review (PyMuPDF, customtkinter,
  # watchdog, extract-msg in particular).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      python-patch:
        update-types:
          - "patch"

  # GitHub Actions used in workflow files (test.yml, build-release.yml,
  # dco.yml). Lower volume than Python deps so a tighter group is fine.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
