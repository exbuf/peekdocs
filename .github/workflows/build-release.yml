name: Build and Release

# Runs when you push a version tag like v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: peekdocs-gui-windows.exe
            cli_artifact: peekdocs-cli-windows.exe
          - os: macos-latest
            artifact: peekdocs-gui-macos.zip
            cli_artifact: peekdocs-cli-macos.zip
          - os: ubuntu-latest
            artifact: peekdocs-gui-linux
            cli_artifact: peekdocs-cli-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build GUI and CLI
        run: python build_app.py

      # --- Windows: rename outputs ---
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          move dist\peekdocs-gui.exe dist\peekdocs-gui-windows.exe
          move dist\peekdocs.exe dist\peekdocs-cli-windows.exe

      # --- macOS: zip the .app bundle and the onedir CLI folder ---
      # Both the GUI .app and the CLI are now PyInstaller --onedir output
      # (directories). The CLI was --onefile previously but switched to
      # --onedir to avoid the per-invocation self-extraction cost — see
      # build_app.py:build_cli(). -r on the CLI zip handles the directory
      # the way -r on the GUI zip already does for the .app bundle.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r peekdocs-gui-macos.zip peekdocs-gui.app
          zip -r peekdocs-cli-macos.zip peekdocs
          cd ..

      # --- Linux: rename outputs ---
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mv dist/peekdocs-gui dist/peekdocs-gui-linux
          mv dist/peekdocs dist/peekdocs-cli-linux

      # --- Smoke test the built CLI binary (Windows only, initially) ---
      # Exercises the shell-binary boundary the in-process test harness
      # skips: PowerShell / cmd argument parsing, shell wildcard handling,
      # backslash regex, Unicode filenames in report files, PyInstaller
      # startup tax. See docs/SMOKE_TEST.md for what these cover and what
      # remains manual. A failure here blocks artifact upload, so a
      # broken binary never publishes to a release.
      - name: Install pytest for smoke tests (Windows)
        if: runner.os == 'Windows'
        run: pip install pytest

      - name: Smoke test the built CLI binary (Windows)
        if: runner.os == 'Windows'
        env:
          PEEKDOCS_BINARY: ${{ github.workspace }}\dist\peekdocs-cli-windows.exe
        run: pytest tests/test_smoke_cli.py -v

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli_artifact }}
          path: dist/${{ matrix.cli_artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout is needed so the "Extract CHANGELOG section" step below
      # can read CHANGELOG.md. The other release steps don't need the
      # working copy, but adding checkout at the top keeps the job
      # idiomatic and lets future steps reference any repo file.
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      # Extract just the [N.N.N] section from CHANGELOG.md for this
      # tag's version. Without this the GitHub Release body was only
      # the auto-generated "Full Changelog: ...compare..." link — the
      # substantive narrative entry in CHANGELOG.md never made it to
      # the release page. The awk script walks the file until it sees
      # `## [<version>]`, then prints subsequent lines until the next
      # `## [` boundary or EOF. Throwaway tags whose versions aren't
      # in CHANGELOG produce an empty file; action-gh-release falls
      # back gracefully to just the auto-generated notes in that case.
      - name: Extract CHANGELOG section for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "\\[" ver "\\]") { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          echo "--- Extracted release notes preview ---"
          head -40 release_notes.md
          echo "--- Total bytes ---"
          wc -c release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release_notes.md
          # Still appends the auto-generated "Full Changelog: ...compare..."
          # link after the body_path content — best of both worlds.
          generate_release_notes: true
