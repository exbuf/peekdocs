name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Full pytest run across all supported OS/Python combinations.
  # fail-fast is off so a single Windows/3.10 failure doesn't mask
  # a Linux/3.14 success and vice versa — useful when triaging
  # platform-specific flakiness.
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Ubuntu's setup-python Pythons need the system Tk runtime to
      # import tkinter at all. macOS and Windows ship Tk by default.
      - name: Install Tk runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install peekdocs and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run full test suite
        run: pytest tests/ -v

  # Separate Linux job that installs peekdocs WITHOUT customtkinter
  # (the GUI dep) and runs only the headless regression tests against
  # that real environment. This upgrades tests/test_headless.py from
  # "simulated headless via MetaPathFinder" to "actually no GUI dep
  # on disk" — catching any future code path that pulls customtkinter
  # at import time on a real headless deployment (containers, slim
  # service images, scheduled-scan VMs).
  test-headless-install:
    name: Headless install (no customtkinter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install peekdocs WITHOUT customtkinter
        run: |
          python -m pip install --upgrade pip
          # --no-deps skips ALL dependencies, then we re-add only the
          # non-GUI ones explicitly. customtkinter is intentionally absent.
          pip install --no-deps -e .
          pip install \
            python-docx PyMuPDF odfpy openpyxl striprtf python-pptx \
            EbookLib Pillow pytesseract rapidfuzz olefile xlrd \
            extract-msg py7zr rarfile fpdf2
          pip install pytest

      - name: Confirm customtkinter is genuinely unimportable
        run: |
          python -c "
          try:
              import customtkinter  # noqa: F401
              raise SystemExit('FAIL: customtkinter should not be installed')
          except ImportError:
              print('OK: customtkinter not installed')
          "

      - name: Run headless tests against the real Tk-less env
        run: pytest tests/test_headless.py -v

      - name: --check must report 0 (CLI fully usable without GUI dep)
        run: |
          python -m peekdocs --check

  # Type-check peekdocs's public + top-level surface with mypy. Scope
  # widened past api.py + paths.py to also cover reporter.py + cli.py.
  # Rest of the codebase is untyped (tracked in
  # docs/ARCHITECTURE.md's known-weaknesses list). See pyproject.toml's
  # [tool.mypy] section for the config.
  #
  # Fast enough to run on every push (~5-10s). Single OS + single
  # Python version — mypy's checks don't need the pytest matrix.
  typecheck:
    name: mypy (public API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install peekdocs and mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mypy

      - name: Run mypy against the typed public surface
        run: mypy

  # OCR integration test: real Tesseract, real image, real pytesseract
  # shell-out. The pytest matrix above already runs tests/test_paths.py
  # which covers Tesseract *detection* (mocked shutil.which +
  # os.path.isfile), but nothing there exercises the actual
  # pytesseract.image_to_string call. The 1.2.77 release bug landed
  # because "detection succeeds via fallback path" didn't imply "OCR
  # execution succeeds" — pytesseract has its own PATH lookup that
  # needed pinning via pytesseract.pytesseract.tesseract_cmd.
  #
  # This job apt-installs Tesseract, then runs
  # tests/test_ocr_integration.py end-to-end so a regression on the
  # detection → cmd-pin → OCR-run contract fails CI, not a user report.
  ocr-integration:
    name: OCR integration (real Tesseract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install system Tesseract + Tk runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr python3-tk

      - name: Install peekdocs + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Confirm Tesseract is on PATH
        run: |
          which tesseract
          tesseract --version | head -1

      - name: Run OCR integration test
        run: pytest tests/test_ocr_integration.py -v
