name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dco-check:
    name: Sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          missing=0

          # Walk every non-merge commit in the PR range.
          # Merge commits created by GitHub's UI don't carry sign-offs
          # and are intentionally excluded — only commits the contributor
          # authored need to be signed off.
          for sha in $(git rev-list --no-merges "${base}..${head}"); do
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")

            # Bots (Dependabot, GitHub Actions, etc.) can't meaningfully
            # attest to the Developer Certificate of Origin — the DCO is
            # an attestation by a human contributor about their own work.
            # Skip any commit whose author name carries the "[bot]" suffix
            # that GitHub uses for bot accounts.
            if [[ "$author_name" == *"[bot]"* ]]; then
              echo "::notice::Skipping bot commit ${sha:0:8} (${author_name})"
              continue
            fi

            expected="Signed-off-by: ${author_name} <${author_email}>"

            if ! git log -1 --format='%B' "$sha" | grep -qxF "${expected}"; then
              echo "::error::Commit ${sha:0:8} is missing a sign-off matching the author."
              echo "  Author:        ${author_name} <${author_email}>"
              echo "  Expected line: ${expected}"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "::error::DCO sign-off check failed."
            echo ""
            echo "Every commit in a pull request must carry a Signed-off-by line"
            echo "matching the commit author, per the Developer Certificate of"
            echo "Origin v1.1 (https://developercertificate.org/)."
            echo ""
            echo "How to fix:"
            echo "  Last commit only:    git commit --amend -s --no-edit"
            echo "  Last N commits:      git rebase HEAD~N --signoff"
            echo "  All commits on PR:   git rebase main --signoff"
            echo "Then: git push --force-with-lease"
            echo ""
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commits are properly signed off per the Developer Certificate of Origin."
