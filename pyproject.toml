[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "peekdocs"
version = "0.3.0"
description = "A CLI tool for searching and retrieving content from documents"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "python-docx>=1.0,<2.0",
    "PyMuPDF>=1.20,<2.0",
    "odfpy>=1.4,<2.0",
    "openpyxl>=3.1,<4.0",
    "striprtf>=0.0.20,<1.0",
    "python-pptx>=1.0,<2.0",
    "EbookLib>=0.18,<1.0",
    "Pillow>=10.0,<13.0",
    "pytesseract>=0.3,<1.0",
    "rapidfuzz>=3.0,<4.0",
    "customtkinter>=5.2,<6.0",
    "olefile>=0.46,<1.0",
    "xlrd>=2.0,<3.0",
    "extract-msg>=0.40,<1.0",
    "py7zr>=1.0,<2.0",
    "rarfile>=4.0,<5.0",
    "fpdf2>=2.7,<3.0",
]

[project.optional-dependencies]
pst = ["libpff-python"]

[tool.setuptools.packages.find]
include = ["peekdocs*"]

[project.scripts]
peekdocs = "peekdocs.cli:main"
peekdocs-gui = "peekdocs.gui:main"
