[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "peekdocs"
version = "0.3.25"
description = "Search 100+ file types at once — offline, private, with PII scanning. CLI + GUI + Python API."
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Environment :: X11 Applications",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "Intended Audience :: System Administrators",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: General",
    "Topic :: Text Processing :: Indexing",
    "Topic :: Utilities",
    "Topic :: Security",
]
keywords = ["document-search", "file-search", "pii-scanner", "text-search", "pdf-search", "docx", "offline", "privacy", "cli", "gui"]
license = "MIT"
authors = [{name = "Robert D. Schoening", email = "bobschoening@gmail.com"}]
requires-python = ">=3.10"
dependencies = [
    "python-docx>=1.0,<2.0",
    "PyMuPDF>=1.20,<2.0",
    "odfpy>=1.4,<2.0",
    "openpyxl>=3.1,<4.0",
    "striprtf>=0.0.20,<1.0",
    "python-pptx>=1.0,<2.0",
    "EbookLib>=0.18,<1.0",
    "Pillow>=10.0,<13.0",
    "pytesseract>=0.3,<1.0",
    "rapidfuzz>=3.0,<4.0",
    "customtkinter>=5.2,<6.0",
    "olefile>=0.46,<1.0",
    "xlrd>=2.0,<3.0",
    "extract-msg>=0.40,<1.0",
    "py7zr>=1.0,<2.0",
    "rarfile>=4.0,<5.0",
    "fpdf2>=2.7,<3.0",
]

[project.optional-dependencies]
pst = ["libpff-python"]

[tool.setuptools.packages.find]
include = ["peekdocs*"]

[project.scripts]
peekdocs = "peekdocs.cli:main"
peekdocs-gui = "peekdocs.gui:main"
