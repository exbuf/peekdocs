[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "peekdocs"
version = "0.3.0"
description = "A CLI tool for searching and retrieving content from documents"
requires-python = ">=3.10"
dependencies = ["python-docx", "PyMuPDF", "odfpy", "openpyxl", "striprtf", "python-pptx", "EbookLib", "Pillow", "pytesseract", "rapidfuzz", "customtkinter>=5.2.0", "olefile", "xlrd", "extract-msg", "py7zr", "rarfile", "fpdf2"]

[project.optional-dependencies]
pst = ["libpff-python"]

[tool.setuptools.packages.find]
include = ["peekdocs*"]

[project.scripts]
peekdocs = "peekdocs.cli:main"
peekdocs-gui = "peekdocs.gui:main"
